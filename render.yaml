services:
  - type: web
    name: rider-ops
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: DATABASE_MASTER_TABLE
        value: master_orders
      - key: DATABASE_UPLOAD_LOG_TABLE
        value: upload_log
      - key: DATABASE_URL
        sync: false
